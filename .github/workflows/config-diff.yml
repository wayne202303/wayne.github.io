name: Config Diff Check

on:
  pull_request:
    paths:
      - '**.xlsx'
      - '**.xls'
      - '**.csv'

jobs:
  config-diff:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .
    
    - name: Get base and head files
      id: files
      run: |
        git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} -- '**.xlsx' '**.xls' '**.csv' > changed_files.txt
        echo "changed_files=$(cat changed_files.txt | tr '\n' ' ')" >> $GITHUB_OUTPUT
    
    - name: Run config diff
      if: steps.files.outputs.changed_files != ''
      run: |
        mkdir -p reports
        
        # 检出基准版本
        git checkout ${{ github.event.pull_request.base.sha }}
        
        # 复制旧文件到临时目录
        mkdir -p old_configs
        for file in ${{ steps.files.outputs.changed_files }}; do
          if [ -f "$file" ]; then
            mkdir -p old_configs/$(dirname "$file")
            cp "$file" old_configs/"$file"
          fi
        done
        
        # 检出最新版本
        git checkout ${{ github.event.pull_request.head.sha }}
        
        # 对每个变更的文件运行diff
        for file in ${{ steps.files.outputs.changed_files }}; do
          if [ -f "old_configs/$file" ] && [ -f "$file" ]; then
            echo "Checking $file..."
            filename=$(basename "$file" | sed 's/\.[^.]*$//')
            config-diff \
              "old_configs/$file" \
              "$file" \
              --html "reports/${filename}_diff.html" \
              --json "reports/${filename}_diff.json" \
              --config config-diff.yaml 2>/dev/null || true
          fi
        done
    
    - name: Upload diff reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: config-diff-reports
        path: reports/
