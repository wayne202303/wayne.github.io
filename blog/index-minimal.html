<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="个人博客 - 分享技术与生活">
    <meta name="keywords" content="博客, 技术, 生活, 分享">
    <meta name="author" content="博客作者">
    <title>个人博客</title>
    <link rel="stylesheet" href="css/style-minimal.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <h1><a href="index-minimal.html">我的个人博客</a></h1>
                <nav>
                    <a href="index-minimal.html" class="active">首页</a>
                    <a href="admin.html">管理</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="list-view" id="list-view">
            <div class="hero">
                <h2>优秀文章</h2>
                <p>分享技术与生活的点滴</p>
            </div>

            <div class="filters" id="category-filters">
            </div>

            <div class="content-wrapper">
                <div class="main-content">
                    <div class="articles-grid" id="articles-grid">
                    </div>

                    <div class="pagination" id="pagination">
                    </div>
                </div>

                <aside class="sidebar">
                    <div class="sidebar-section">
                        <h4>最新文章</h4>
                        <ul class="sidebar-list" id="recent-articles">
                        </ul>
                    </div>

                    <div class="sidebar-section">
                        <h4>分类</h4>
                        <ul class="sidebar-list" id="sidebar-categories">
                        </ul>
                    </div>

                    <div class="sidebar-section">
                        <h4>标签</h4>
                        <div class="article-tags" id="sidebar-tags">
                        </div>
                    </div>
                </aside>
            </div>
        </div>

        <div class="post-view" id="post-view" style="display: none;">
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <p>&copy; 2024 个人博客. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/app-minimal.js"></script>
</body>
</html>
