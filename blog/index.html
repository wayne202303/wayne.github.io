<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="个人博客 - 分享技术与生活">
    <meta name="keywords" content="博客, 技术, 生活, 分享">
    <meta name="author" content="博客作者">
    <title>个人博客</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="blog-title">
                <a href="#/">我的个人博客</a>
            </h1>
            <nav class="nav">
                <a href="#/" class="nav-link active">首页</a>
                <a href="#/categories" class="nav-link">分类</a>
                <a href="#/tags" class="nav-link">标签</a>
                <a href="#/about" class="nav-link">关于</a>
            </nav>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索文章..." class="search-input">
                <button id="searchBtn" class="search-btn">搜索</button>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <aside class="sidebar">
                <div class="sidebar-section">
                    <h3>分类</h3>
                    <ul id="categoryList" class="category-list"></ul>
                </div>
                <div class="sidebar-section">
                    <h3>标签</h3>
                    <div id="tagList" class="tag-list"></div>
                </div>
                <div class="sidebar-section">
                    <h3>最新文章</h3>
                    <ul id="recentPosts" class="recent-posts"></ul>
                </div>
            </aside>

            <section class="content">
                <div id="articleList" class="article-list"></div>
                
                <div id="pagination" class="pagination"></div>
            </section>
        </div>
    </main>

    <article id="articleDetail" class="article-detail hidden">
        <div class="container">
            <button id="backBtn" class="back-btn">← 返回列表</button>
            <div id="articleContent"></div>
        </div>
    </article>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 个人博客. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
